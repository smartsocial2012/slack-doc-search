version: '3.8'

services:
  qna-app:
    build: .
    container_name: slack-qna-bot
    restart: always
    env_file:
      - .env
    environment:
      # EC2 호스트의 DB에 접속하기 위한 설정
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      POSTGRES_DB: qna_bot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: doc123
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./temp:/app/temp